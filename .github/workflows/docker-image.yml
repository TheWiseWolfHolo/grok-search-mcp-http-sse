name: Docker Image

on:
  push:
    branches:
      - main
      - grok-with-tavily
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image name
        id: prep
        shell: bash
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set GHCR package public
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          IMAGE_NAME: ${{ github.event.repository.name }}
        run: |
          owner_lc="${OWNER,,}"
          image_lc="${IMAGE_NAME,,}"

          set_visibility() {
            local endpoint="$1"
            local status
            status="$(curl -sS -o /tmp/ghcr_visibility_resp.json -w "%{http_code}" \
              -X PATCH \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${endpoint}" \
              -d '{"visibility":"public"}')"
            echo "endpoint=${endpoint}"
            echo "status=${status}"
            cat /tmp/ghcr_visibility_resp.json || true
            if [[ "${status}" =~ ^2 ]]; then
              return 0
            fi
            return 1
          }

          if ! set_visibility "https://api.github.com/users/${owner_lc}/packages/container/${image_lc}/visibility" \
            && ! set_visibility "https://api.github.com/user/packages/container/${image_lc}/visibility"; then
            echo "Failed to auto-set package visibility. Please set it manually in GitHub package settings."
            echo "https://github.com/users/${owner_lc}/packages/container/${image_lc}/settings"
          fi
